<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="g-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6D35"/>
      <stop offset="100%" stop-color="#E65520"/>
    </linearGradient>
    <linearGradient id="g-brand-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6D35" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF6D35" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64D2FF"/>
      <stop offset="100%" stop-color="#007AFF"/>
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#30D158"/>
      <stop offset="100%" stop-color="#28A745"/>
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BF5AF2"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="g-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
    <linearGradient id="g-card-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C2C2E"/>
      <stop offset="100%" stop-color="#1C1C1E"/>
    </linearGradient>
    <linearGradient id="g-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow-brand" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#FF6D35" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#64D2FF" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#30D158" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#BF5AF2" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow-card" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <clipPath id="card-clip"><rect width="900" height="560" rx="24"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" rx="24" fill="#0A0A0A" clip-path="url(#card-clip)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="560" fill="url(#grid)"/>

  <!-- Ambient glow orbs -->
  <circle cx="450" cy="200" r="280" fill="#FF6D35" opacity="0.04"/>
  <circle cx="200" cy="400" r="200" fill="#64D2FF" opacity="0.03"/>
  <circle cx="700" cy="450" r="180" fill="#BF5AF2" opacity="0.03"/>

  <!-- ═══════════════════════════════════════════════════════
       CENTER: Shield / Governance Core
       ═══════════════════════════════════════════════════════ -->
  <g transform="translate(450, 195)" filter="url(#glow-brand)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="url(#g-brand)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="#FF6D35" stroke-width="1.5" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="45s" repeatCount="indefinite"/>
    </circle>
    <!-- Shield body -->
    <path d="M0-48 C0-48 -38-36 -38-16 C-38 18 0 48 0 48 C0 48 38 18 38-16 C38-36 0-48 0-48Z" fill="url(#g-card-dark)" stroke="url(#g-brand)" stroke-width="2"/>
    <!-- Shield inner glow -->
    <path d="M0-48 C0-48 -38-36 -38-16 C-38 18 0 48 0 48 C0 48 38 18 38-16 C38-36 0-48 0-48Z" fill="url(#g-glass)"/>
    <!-- Checkmark inside shield -->
    <polyline points="-14,2 -4,12 16,-10" fill="none" stroke="#FF6D35" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Label -->
    <text y="88" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="700" fill="#F5F5F7" letter-spacing="0.5">GOVERNANCE ENGINE</text>
    <text y="106" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#A1A1A6">59 policies · 10 categories</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       ORBITAL NODES — Floating module cards
       ═══════════════════════════════════════════════════════ -->

  <!-- Node: CLAUDE.md (top-left) -->
  <g transform="translate(140, 110)" filter="url(#shadow-card)">
    <rect width="172" height="88" rx="16" fill="url(#g-card-dark)" stroke="#38383A" stroke-width="1"/>
    <rect width="172" height="88" rx="16" fill="url(#g-glass)"/>
    <!-- File icon -->
    <rect x="16" y="18" width="32" height="32" rx="8" fill="#FF6D35" fill-opacity="0.15"/>
    <path d="M26 28 L34 28 L38 32 L38 42 L26 42Z" fill="none" stroke="#FF6D35" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="30" y1="36" x2="36" y2="36" stroke="#FF6D35" stroke-width="1" stroke-linecap="round"/>
    <line x1="30" y1="39" x2="34" y2="39" stroke="#FF6D35" stroke-width="1" stroke-linecap="round"/>
    <text x="56" y="33" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="11.5" font-weight="700" fill="#F5F5F7">CLAUDE.md</text>
    <text x="56" y="47" font-family="-apple-system, sans-serif" font-size="9" fill="#A1A1A6">AI instructions</text>
    <!-- Progress bar -->
    <rect x="16" y="62" width="140" height="4" rx="2" fill="#38383A"/>
    <rect x="16" y="62" width="140" height="4" rx="2" fill="url(#g-brand)">
      <animate attributeName="width" values="0;140" dur="2.5s" fill="freeze"/>
    </rect>
    <text x="16" y="78" font-family="-apple-system, sans-serif" font-size="8" fill="#6E6E73">Stack-aware · Context-rich</text>
  </g>

  <!-- Connection line: CLAUDE.md → Shield -->
  <line x1="312" y1="154" x2="393" y2="185" stroke="#FF6D35" stroke-width="1" stroke-dasharray="4 3" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="2s" repeatCount="indefinite"/>
  </line>
  <circle cx="393" cy="185" r="3" fill="#FF6D35" opacity="0.6"/>

  <!-- Node: Auto-Skills (top-right) -->
  <g transform="translate(588, 95)" filter="url(#shadow-card)">
    <rect width="172" height="88" rx="16" fill="url(#g-card-dark)" stroke="#38383A" stroke-width="1"/>
    <rect width="172" height="88" rx="16" fill="url(#g-glass)"/>
    <!-- Sparkle icon -->
    <rect x="16" y="18" width="32" height="32" rx="8" fill="#BF5AF2" fill-opacity="0.15"/>
    <path d="M32 26 L30.5 30.5 L26 32 L30.5 33.5 L32 38 L33.5 33.5 L38 32 L33.5 30.5Z" fill="#BF5AF2" stroke="none"/>
    <circle cx="26" cy="26" r="1" fill="#BF5AF2" opacity="0.6"/>
    <circle cx="38" cy="38" r="1.2" fill="#BF5AF2" opacity="0.6"/>
    <text x="56" y="33" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="11.5" font-weight="700" fill="#F5F5F7">Auto-Skills</text>
    <text x="56" y="47" font-family="-apple-system, sans-serif" font-size="9" fill="#A1A1A6">Stack detection</text>
    <!-- Skill chips -->
    <rect x="16" y="58" width="52" height="18" rx="9" fill="#BF5AF2" fill-opacity="0.12" stroke="#BF5AF2" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="42" y="70" text-anchor="middle" font-family="'SF Mono', monospace" font-size="7.5" fill="#BF5AF2">react</text>
    <rect x="72" y="58" width="52" height="18" rx="9" fill="#BF5AF2" fill-opacity="0.12" stroke="#BF5AF2" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="98" y="70" text-anchor="middle" font-family="'SF Mono', monospace" font-size="7.5" fill="#BF5AF2">prisma</text>
    <rect x="128" y="58" width="32" height="18" rx="9" fill="#BF5AF2" fill-opacity="0.12" stroke="#BF5AF2" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="144" y="70" text-anchor="middle" font-family="'SF Mono', monospace" font-size="7.5" fill="#BF5AF2">+8</text>
  </g>

  <!-- Connection line: Auto-Skills → Shield -->
  <line x1="588" y1="145" x2="510" y2="185" stroke="#BF5AF2" stroke-width="1" stroke-dasharray="4 3" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="2s" repeatCount="indefinite"/>
  </line>
  <circle cx="510" cy="185" r="3" fill="#BF5AF2" opacity="0.6"/>

  <!-- Node: Governance Audit (bottom-left) -->
  <g transform="translate(80, 340)" filter="url(#shadow-card)">
    <rect width="200" height="108" rx="16" fill="url(#g-card-dark)" stroke="#38383A" stroke-width="1"/>
    <rect width="200" height="108" rx="16" fill="url(#g-glass)"/>
    <!-- Shield icon -->
    <rect x="16" y="16" width="32" height="32" rx="8" fill="#30D158" fill-opacity="0.15"/>
    <path d="M32 22 C32 22 24 26 24 32 C24 38 32 44 32 44 C32 44 40 38 40 32 C40 26 32 22 32 22Z" fill="none" stroke="#30D158" stroke-width="1.5"/>
    <polyline points="29,32 31,34 35,30" fill="none" stroke="#30D158" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="56" y="31" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="11.5" font-weight="700" fill="#F5F5F7">vibe audit</text>
    <text x="56" y="45" font-family="-apple-system, sans-serif" font-size="9" fill="#A1A1A6">10-category scorecard</text>
    <!-- Scorecard bars -->
    <g transform="translate(16, 60)">
      <text x="0" y="8" font-family="-apple-system, sans-serif" font-size="7.5" fill="#6E6E73">Security</text>
      <rect x="55" y="1" width="120" height="6" rx="3" fill="#38383A"/>
      <rect x="55" y="1" width="108" height="6" rx="3" fill="url(#g-green)"><animate attributeName="width" values="0;108" dur="1.8s" fill="freeze"/></rect>
      <text x="0" y="22" font-family="-apple-system, sans-serif" font-size="7.5" fill="#6E6E73">Clean Code</text>
      <rect x="55" y="15" width="120" height="6" rx="3" fill="#38383A"/>
      <rect x="55" y="15" width="96" height="6" rx="3" fill="url(#g-blue)"><animate attributeName="width" values="0;96" dur="2s" fill="freeze"/></rect>
      <text x="0" y="36" font-family="-apple-system, sans-serif" font-size="7.5" fill="#6E6E73">Reliability</text>
      <rect x="55" y="29" width="120" height="6" rx="3" fill="#38383A"/>
      <rect x="55" y="29" width="114" height="6" rx="3" fill="url(#g-purple)"><animate attributeName="width" values="0;114" dur="2.2s" fill="freeze"/></rect>
    </g>
  </g>

  <!-- Connection line: Audit → Shield -->
  <line x1="230" y1="340" x2="420" y2="260" stroke="#30D158" stroke-width="1" stroke-dasharray="4 3" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="2s" repeatCount="indefinite"/>
  </line>
  <circle cx="420" cy="260" r="3" fill="#30D158" opacity="0.6"/>

  <!-- Node: Context Anchoring (bottom-center) -->
  <g transform="translate(350, 370)" filter="url(#shadow-card)">
    <rect width="200" height="100" rx="16" fill="url(#g-card-dark)" stroke="#38383A" stroke-width="1"/>
    <rect width="200" height="100" rx="16" fill="url(#g-glass)"/>
    <!-- Anchor icon -->
    <rect x="16" y="16" width="32" height="32" rx="8" fill="#64D2FF" fill-opacity="0.15"/>
    <circle cx="32" cy="24" r="3" fill="none" stroke="#64D2FF" stroke-width="1.5"/>
    <line x1="32" y1="27" x2="32" y2="40" stroke="#64D2FF" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M26 36 C26 40 32 42 32 42 C32 42 38 40 38 36" fill="none" stroke="#64D2FF" stroke-width="1.5" stroke-linecap="round"/>
    <text x="56" y="31" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="11.5" font-weight="700" fill="#F5F5F7">vibe anchor</text>
    <text x="56" y="45" font-family="-apple-system, sans-serif" font-size="9" fill="#A1A1A6">Context persistence</text>
    <!-- Decision chips -->
    <g transform="translate(16, 58)">
      <rect width="168" height="28" rx="8" fill="#64D2FF" fill-opacity="0.06" stroke="#64D2FF" stroke-opacity="0.15" stroke-width="0.5"/>
      <text x="10" y="11" font-family="'SF Mono', monospace" font-size="7" fill="#64D2FF">decisions</text>
      <text x="60" y="11" font-family="-apple-system, sans-serif" font-size="7" fill="#6E6E73">·</text>
      <text x="68" y="11" font-family="'SF Mono', monospace" font-size="7" fill="#64D2FF">constraints</text>
      <text x="124" y="11" font-family="-apple-system, sans-serif" font-size="7" fill="#6E6E73">·</text>
      <text x="132" y="11" font-family="'SF Mono', monospace" font-size="7" fill="#64D2FF">state</text>
      <text x="10" y="23" font-family="-apple-system, sans-serif" font-size="7" fill="#6E6E73">Survives across AI sessions</text>
    </g>
  </g>

  <!-- Connection line: Anchor → Shield -->
  <line x1="450" y1="370" x2="450" y2="268" stroke="#64D2FF" stroke-width="1" stroke-dasharray="4 3" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="2s" repeatCount="indefinite"/>
  </line>
  <circle cx="450" cy="268" r="3" fill="#64D2FF" opacity="0.6"/>

  <!-- Node: Policy Engine (bottom-right) -->
  <g transform="translate(620, 330)" filter="url(#shadow-card)">
    <rect width="200" height="115" rx="16" fill="url(#g-card-dark)" stroke="#38383A" stroke-width="1"/>
    <rect width="200" height="115" rx="16" fill="url(#g-glass)"/>
    <!-- Layers icon -->
    <rect x="16" y="16" width="32" height="32" rx="8" fill="#FFD60A" fill-opacity="0.15"/>
    <polygon points="32,22 22,27 32,32 42,27" fill="none" stroke="#FFD60A" stroke-width="1.3" stroke-linejoin="round"/>
    <polyline points="22,32 32,37 42,32" fill="none" stroke="#FFD60A" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <polyline points="22,36 32,41 42,36" fill="none" stroke="#FFD60A" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    <text x="56" y="31" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="11.5" font-weight="700" fill="#F5F5F7">59 Policies</text>
    <text x="56" y="45" font-family="-apple-system, sans-serif" font-size="9" fill="#A1A1A6">YAML governance</text>
    <!-- Category pills -->
    <g transform="translate(16, 58)">
      <rect width="42" height="16" rx="8" fill="#FF453A" fill-opacity="0.12"/><text x="21" y="11" text-anchor="middle" font-size="7" font-family="'SF Mono', monospace" fill="#FF6B6B">SEC 9</text>
      <rect x="46" width="40" height="16" rx="8" fill="#64D2FF" fill-opacity="0.12"/><text x="66" y="11" text-anchor="middle" font-size="7" font-family="'SF Mono', monospace" fill="#64D2FF">CC 10</text>
      <rect x="90" width="42" height="16" rx="8" fill="#30D158" fill-opacity="0.12"/><text x="111" y="11" text-anchor="middle" font-size="7" font-family="'SF Mono', monospace" fill="#30D158">REL 8</text>
      <rect x="136" width="42" height="16" rx="8" fill="#FFD60A" fill-opacity="0.12"/><text x="157" y="11" text-anchor="middle" font-size="7" font-family="'SF Mono', monospace" fill="#FFD60A">12F 7</text>
      <rect y="20" width="42" height="16" rx="8" fill="#BF5AF2" fill-opacity="0.12"/><text x="21" y="31" text-anchor="middle" font-size="7" font-family="'SF Mono', monospace" fill="#BF5AF2">API 5</text>
      <rect x="46" y="20" width="42" height="16" rx="8" fill="#FF9500" fill-opacity="0.12"/><text x="67" y="31" text-anchor="middle" font-size="7" font-family="'SF Mono', monospace" fill="#FF9F40">CR 6</text>
      <rect x="92" y="20" width="42" height="16" rx="8" fill="#64D2FF" fill-opacity="0.12"/><text x="113" y="31" text-anchor="middle" font-size="7" font-family="'SF Mono', monospace" fill="#64D2FF">+4</text>
    </g>
  </g>

  <!-- Connection line: Policies → Shield -->
  <line x1="620" y1="370" x2="510" y2="255" stroke="#FFD60A" stroke-width="1" stroke-dasharray="4 3" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="2s" repeatCount="indefinite"/>
  </line>
  <circle cx="510" cy="255" r="3" fill="#FFD60A" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════════════════
       BOTTOM: Grade badge
       ═══════════════════════════════════════════════════════ -->
  <g transform="translate(450, 520)">
    <rect x="-80" y="-18" width="160" height="32" rx="16" fill="#30D158" fill-opacity="0.1" stroke="#30D158" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="-56" cy="-2" r="4" fill="#30D158">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="3" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="11" font-weight="600" fill="#30D158">Governance Score: A+</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       Floating particles
       ═══════════════════════════════════════════════════════ -->
  <circle cx="100" cy="60" r="1.5" fill="#FF6D35" opacity="0.3">
    <animate attributeName="cy" values="60;50;60" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="80" r="1" fill="#64D2FF" opacity="0.3">
    <animate attributeName="cy" values="80;68;80" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="500" r="1.5" fill="#BF5AF2" opacity="0.25">
    <animate attributeName="cy" values="500;488;500" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="480" r="1" fill="#30D158" opacity="0.3">
    <animate attributeName="cy" values="480;470;480" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="30" r="1.2" fill="#FFD60A" opacity="0.2">
    <animate attributeName="cy" values="30;22;30" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="510" r="1" fill="#FF6D35" opacity="0.2">
    <animate attributeName="cx" values="320;328;320" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="520" r="1.3" fill="#64D2FF" opacity="0.2">
    <animate attributeName="cx" values="580;572;580" dur="5.5s" repeatCount="indefinite"/>
  </circle>
</svg>
